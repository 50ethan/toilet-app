version: '3.8'
services:
  app:
    build: .
    container_name: toilet-app
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
    environment:
      - SECRET_KEY=change_this_secret_key_later
      - JWT_SECRET=sora-jwt-secret-2026
      - DATABASE_URL=sqlite:///data/toilet.db
