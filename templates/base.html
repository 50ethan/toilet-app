<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>トイレ管理システム</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-primary px-3">
  <span class="navbar-brand"><img src="/static/logo.png" height="40" class="me-2">トイレ管理</span>
  <div>
    <a href="/" class="btn btn-outline-light btn-sm me-1">案件一覧</a>
    <a href="/jobs/add" class="btn btn-warning btn-sm me-1">新規案件</a>
    <a href="/clients" class="btn btn-outline-light btn-sm me-1">得意先</a>
    <a href="/vendors" class="btn btn-outline-light btn-sm me-1">業者</a>
    <a href="/settings" class="btn btn-outline-light btn-sm me-1">設定</a><a href="/logout" class="btn btn-danger btn-sm">ログアウト</a>
  </div>
</nav>
<div class="container mt-4">
{% with messages = get_flashed_messages() %}
{% if messages %}
<div class="alert alert-success">{{ messages[0] }}</div>
{% endif %}
{% endwith %}
{% block content %}{% endblock %}
</div>
<footer class="mt-5 py-4 text-center" style="background:#0a1628; color:#00bfff;">

</footer>

</html>
