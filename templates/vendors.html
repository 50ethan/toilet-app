{% extends "base.html" %}
{% block content %}
<h3>業者一覧</h3>
<a href="/vendors/add" class="btn btn-primary mb-3">＋ 業者追加</a>
<table class="table">
<thead><tr><th>名前</th><th>種別</th><th>電話</th><th>メール</th></tr></thead>
<tbody>
{% for v in vendors %}
<tr><td>{{ v.name }}</td><td>{{ v.service_type }}</td><td>{{ v.phone }}</td><td>{{ v.email }}</td></tr>
{% endfor %}
</tbody>
</table>
{% endblock %}
