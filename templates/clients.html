{% extends "base.html" %}
{% block content %}
<h3>得意先一覧</h3>
<a href="/clients/add" class="btn btn-primary mb-3">＋ 得意先追加</a>
<table class="table">
<thead><tr><th>名前</th><th>電話</th><th>メール</th><th>住所</th></tr></thead>
<tbody>
{% for c in clients %}
<tr><td>{{ c.name }}</td><td>{{ c.phone }}</td><td>{{ c.email }}</td><td>{{ c.address }}</td></tr>
{% endfor %}
</tbody>
</table>
{% endblock %}
