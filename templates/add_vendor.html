{% extends "base.html" %}
{% block content %}
<h3>業者追加</h3>
<form method="POST" class="col-md-6">
  <div class="mb-3"><input type="text" name="name" class="form-control" placeholder="業者名" required></div>
  <div class="mb-3">
    <select name="service_type" class="form-select">
      <option value="設置">設置</option>
      <option value="撤去">撤去</option>
      <option value="汲み取り">汲み取り</option>
      <option value="全般">全般</option>
    </select>
  </div>
  <div class="mb-3"><input type="tel" name="phone" class="form-control" placeholder="電話番号"></div>
  <div class="mb-3"><input type="email" name="email" class="form-control" placeholder="メールアドレス" required></div>
  <button class="btn btn-primary">追加</button>
  <a href="/vendors" class="btn btn-secondary ms-2">戻る</a>
</form>
{% endblock %}
